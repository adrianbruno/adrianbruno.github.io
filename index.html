<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Adrian Bruno – Apps</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg1: #f9fafb;
      --bg2: #eef2ff;
      --bg3: #f0fdf4;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --radius: 20px;
    }

    body.dark {
      --bg1: #0f172a;
      --bg2: #1e293b;
      --bg3: #020617;
      --card: #020617;
      --text: #e5e7eb;
      --muted: #9ca3af;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      color: var(--text);
      background: linear-gradient(120deg, var(--bg1), var(--bg2), var(--bg3));
      background-size: 400% 400%;
      animation: bgMove 25s ease infinite;
    }

    @keyframes bgMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    header {
      text-align: center;
      padding: 3rem 1rem 2rem;
    }

    header h1 { font-size: 2.5rem; }

    .toggle {
      position: fixed;
      top: 1rem;
      right: 1rem;
      border: none;
      border-radius: 999px;
      padding: 0.4rem 0.9rem;
      cursor: pointer;
      background: var(--card);
      color: var(--text);
    }

    /* CARRUSEL 3D */
    .carousel-wrapper {
      perspective: 1200px;
      display: flex;
      justify-content: center;
    }

    .carousel {
      display: flex;
      gap: 1.5rem;
      overflow: hidden;
      padding: 3rem 0;
    }

    .app-card {
      min-width: 260px;
      max-width: 260px;
      background: var(--card);
      border-radius: var(--radius);
      padding: 1.5rem;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      transition: transform 0.6s ease, opacity 0.6s ease;
      opacity: 0.3;
      transform: scale(0.7) rotateY(30deg);
    }

    .app-card.center {
      transform: scale(1.1) rotateY(0deg);
      opacity: 1;
      z-index: 3;
    }

    .app-card.left {
      transform: scale(0.85) rotateY(25deg) translateX(-40px);
      opacity: 0.6;
    }

    .app-card.right {
      transform: scale(0.85) rotateY(-25deg) translateX(40px);
      opacity: 0.6;
    }

    .app-icon img {
      width: 64px;
      height: 64px;
    }

    .details {
      max-width: 900px;
      margin: 3rem auto;
      background: rgba(255,255,255,0.9);
      border-radius: var(--radius);
      padding: 2.5rem;
    }

    body.dark .details { background: rgba(15,23,42,0.85); }

  </style>
</head>
<body>

<button class="toggle" onclick="toggleTheme()">🌙 / ☀️</button>

<header>
  <h1>Adrian Bruno – Apps</h1>
  <p>Aplicaciones simples, claras y pensadas para el día a día</p>
</header>

<div class="carousel-wrapper">
  <section class="carousel" id="carousel">

    <div class="app-card" onclick="showDetails('linedance')">
      <div class="app-icon"><img src="icons/linedance.png"></div>
      <h3>LineDance App</h3>
    </div>

    <div class="app-card" onclick="showDetails('carrusel')">
      <div class="app-icon"><img src="icons/carrusel.png"></div>
      <h3>Carrusel AB</h3>
    </div>

    <div class="app-card" onclick="showDetails('reloj')">
      <div class="app-icon">⏳</div>
      <h3>Reloj de Arena</h3>
    </div>

  </section>
</div>

<section class="details" id="details"></section>

<script>
  const cards = document.querySelectorAll('.app-card');
  let index = 0;

  function updateCarousel() {
    cards.forEach((card, i) => {
      card.classList.remove('left', 'center', 'right');

      if (i === index) card.classList.add('center');
      else if (i === (index - 1 + cards.length) % cards.length) card.classList.add('left');
      else if (i === (index + 1) % cards.length) card.classList.add('right');
    });
  }

  function next() {
    index = (index + 1) % cards.length;
    updateCarousel();
  }

  setInterval(next, 2500);
  updateCarousel();

  function toggleTheme() {
    document.body.classList.toggle('dark');
  }
</script>

</body>
</html>
